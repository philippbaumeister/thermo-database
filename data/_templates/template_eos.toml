# This is a template for an EoS parameter file containing metadata about the EoS parameters for a given material,
# as well as the validity range of the EoS.
# The unique_id should match the unique_id in the corresponding *_source.toml file.

unique_id = "template"  # Unique identifier as defined in the *_source.toml, e.g. "miozzi2020"

[science]
material = ""  # Material name, e.g. "iron"
formula = ""  # Chemical formula, e.g. "Fe"
phase = ""  # Phase, e.g. "solid"
crystal = ""  # Crystal structure, e.g. "hcp"
method = ""  # Experimental or computational method, e.g. "DAC"

[description]
type = "" # Type of EOS, e.g. "fit" or "tabulated"
cold_type = ""  # Type of isothermal EoS, e.g. "bm3" for Birch-Murnaghan 3rd order
thermal_exist = true  # True if the EOS includes a thermal component, false if it is purely isothermal
thermal_type = "debye"  # Type of thermal model, e.g. "debye" for Mie-Gruneisen-Debye
reference_temperature = 300  # Reference temperature for the cold curve, e.g. 300 K

[validity]
min_p = 10e9  # Lower boundary in pressure of EOS validity range, e.g. 10e9 = 10 GPa
max_p = 150e9  # Upper boundary in pressure of EOS validity range, e.g. 150e9 = 150 GPa
min_t = 300  # Lower boundary in temperature of EOS validity range, e.g. 300 K
max_t = 4000  # Upper boundary in pressure of EOS validity range, e.g. 4000 K
min_rho = 8e3  # Lower boundary in density of EOS validity range, e.g. 8e3 kg/m^3
max_rho = 12e3  # Upper boundary in pressure of EOS validity range, e.g. 12e3 kg/m^3

[parameters]
# This section should be filled with the parameters of the EOS fit, e.g. V_0, K_0, K_0_prime, etc., along with their
# uncertainties if available. The specific parameters will depend on the type of EOS and thermal model used.
# Uncertainties should be prefixed with 'd', e.g. dV_0 for the uncertainty in V_0.
# Also include the temperature parameters if a thermal model is used