# This is a template for an EoS parameter file containing metadata about the EoS parameters for a given material,
# as well as the validity range of the EoS.
# The unique_id should match the unique_id in the corresponding *_source.toml file.

unique_id = "template"  # This should be replaced with a unique identifier as defined in the *_source.toml, e.g. "miozzi2020"

[science]
material = ""  # This should be replaced with the material name, e.g. "iron"
formula = ""  # This should be replaced with the chemical formula, e.g. "Fe"
phase = ""  # This should be replaced with the phase, e.g. "solid"
crystal = ""  # This should be replaced with the crystal structure, e.g. "hcp"
method = ""  # This should be replaced with the experimental or computational method, e.g. "DAC"

[description]
type = "" # This should be replaced with the type of EOS, e.g. "fit" or "tabulated"
cold_type = ""  # This should be replaced with the type of isothermal EoS, e.g. "bm3" for Birch-Murnaghan 3rd order
thermal_exist = true  # This should be set to true if the EOS includes a thermal component, false if it is purely isothermal
thermal_type = "debye"  # This should be replaced with the type of thermal model, e.g. "debye" for Mie-Gruneisen-Debye
reference_temperature = 300  # This should be replaced with the reference temperature for the cold curve, e.g. 300 K

[validity]
min_p = 10  # This should be replaced with the minimum pressure for which the EOS is valid, e.g. 10 GPa
max_p = 150  # This should be replaced with the maximum pressure for which the EOS is valid, e.g. 150 GPa
min_t = 300  # This should be replaced with the minimum temperature for which the EOS is valid, e.g. 300 K
max_t = 4000  # This should be replaced with the maximum temperature for which the EOS is valid, e.g. 4000 K
min_rho = 8  # This should be replaced with the minimum density for which the EOS is valid, e.g. 8 g/cm^3
max_rho = 12  # This should be replaced with the maximum density for which the EOS is valid, e.g. 12 g/cm^3

[parameters]
# This section should be filled with the parameters of the EOS fit, e.g. V_0, K_0, K_0_prime, etc., along with their
# uncertainties if available. The specific parameters will depend on the type of EOS and thermal model used.
# Uncertainties should be prefixed with 'd', e.g. dV_0 for the uncertainty in V_0.
# Also include the temperature parameters if a thermal model is used